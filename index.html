<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
  
<meta charset="UTF-8">
<title>kosame</title>
  
<link rel="apple-touch-icon" href="icon.png">

<style>


body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(#e8edf2,#cfd8df);
font-family: 'DotGothic16', sans-serif;
color:#2c2c2c;
}

.container{
max-width:700px;
padding:40px;
text-align:center;
}

#text{
font-size:40px;
line-height:1.7;
letter-spacing:0.06em;
max-width:800px;
margin:auto;
}

.title{
position:absolute;
top:30px;
left:40px;
font-size:14px;
letter-spacing:0.2em;
color:#666;
}

.rain{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.drop{
position:absolute;
width:1px;
height:20px;
background:rgba(255,255,255,0.4);
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-100px);
}
100%{
transform:translateY(100vh);
}


#author{
margin-top:25px;
font-size:22px;
color:#555;
}

#date{
  font-size:14px;
  color:#888;
  margin-bottom:20px;
  letter-spacing:1px;
}  

@media (max-width:600px){

#text{
font-size:42px;
line-height:1.8;
}

#author{
font-size:22px;
}

.title{
font-size:28px;
left:24px;
top:24px;
}

.container{
padding:30px;
}

}
  
</style>
</head>

<body>
<div class="rain" id="rain"></div>
  
<div class="title">
kosame
</div>

<div class="container">
<div id="date"></div>
<div id="text"></div>
<div id="author"></div>
</div>

<script>

function showSentence(d){

document.getElementById("text").innerText = d.sentence

let authorText = ""

if(d.author){
authorText += "— " + d.author
}

if(d.work){
authorText += "『" + d.work + "』"
}

document.getElementById("author").innerText = authorText

}

fetch("https://api.open-meteo.com/v1/forecast?latitude=33.59&longitude=130.40&current_weather=true")
.then(r => r.json())
.then(weather => {

let code = weather.current_weather.weathercode

// 雨判定
if(code >= 51 && code <= 82){

fetch("data/rain.json")
.then(r => r.json())
.then(showSentence)

}else{

// 晴れ・曇り
document.getElementById("text").innerText = "今日は雨を待つ日"
document.getElementById("author").innerText = ""

}

})

// 雨アニメーション
const rain = document.getElementById("rain")

for(let i=0;i<80;i++){

const drop = document.createElement("div")
drop.className="drop"

drop.style.left=Math.random()*100+"vw"
drop.style.animationDuration=(0.8+Math.random()*1)+"s"
drop.style.opacity=Math.random()

rain.appendChild(drop)

}

</script>

</body>
</html>
