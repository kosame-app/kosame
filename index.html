<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>kosame</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(#e8edf2,#cfd8df);
font-family: "Hiragino Mincho ProN", serif;
color:#2c2c2c;
}

.container{
max-width:700px;
padding:40px;
text-align:center;
}

#text{
font-size:28px;
line-height:1.8;
letter-spacing:0.05em;
}

.title{
position:absolute;
top:30px;
left:40px;
font-size:14px;
letter-spacing:0.2em;
color:#666;
}

.rain{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.drop{
position:absolute;
width:1px;
height:20px;
background:rgba(255,255,255,0.4);
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-100px);
}
100%{
transform:translateY(100vh);
}
}
</style>
#author{
margin-top:20px;
font-size:18px;
color:#555;
}
</head>

<body>
<div class="rain" id="rain"></div>
  
<div class="title">
kosame
</div>

<div class="container">
<div id="text"></div>
<div id="author"></div>
</div>

<script>

fetch("data/latest.json")
.then(r => r.json())
.then(d => {

document.getElementById("text").innerText = d.sentence

let authorText = ""

if(d.author){
authorText += "— " + d.author
}

if(d.work){
authorText += "『" + d.work + "』"
}

document.getElementById("author").innerText = authorText

})

const rain = document.getElementById("rain")

for(let i=0;i<120;i++){

const drop = document.createElement("div")
drop.className="drop"

drop.style.left=Math.random()*100+"vw"
drop.style.animationDuration=(0.8+Math.random()*1)+"s"
drop.style.opacity=Math.random()

rain.appendChild(drop)

}
  
</script>

</body>
</html>
